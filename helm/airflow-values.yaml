# helm/airflow-values.yaml
# Airflow 3.x with CeleryExecutor
# Simplified configuration compatible with Airflow Helm Chart 1.20.0

# --- Environment Variables ---
env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"
  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "True"
  - name: AIRFLOW__WEBSERVER__AUTHENTICATE
    value: "False"
  - name: AIRFLOW__MIGRATION_TIMEOUT
    value: "600"
  - name: AIRFLOW__CELERY__WORKER_CONCURRENCY
    value: "4"

# --- Executor ---
executor: CeleryExecutor

# --- DAGs ---
dags:
  persistence:
    enabled: false  # Using ConfigMap
  gitSync:
    enabled: false

# Volume mount for DAGs from ConfigMap
extraVolumeMounts:
  - name: dag-files
    mountPath: /opt/airflow/dags
    readOnly: true

extraVolumes:
  - name: dag-files
    configMap:
      name: airflow-dag-examples

# --- PostgreSQL Database ---
postgresql:
  enabled: true

# --- Redis (Celery Broker) ---
redis:
  enabled: true

# --- Workers ---
workers:
  replicas: 1  # Start with 1 worker
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2048Mi

# --- Scheduler ---
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi

# --- Webserver ---
webserver:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    ports:
      - name: airflow-ui
        port: 8080

# --- Statsd ---
statsd:
  enabled: false

# --- PGBouncer ---
pgbouncer:
  enabled: false

# --- Ingress ---
ingress:
  web:
    enabled: false

# --- Pod Disruption Budget ---
podDisruptionBudget:
  enabled: false
