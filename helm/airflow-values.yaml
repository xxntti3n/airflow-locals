# helm/airflow-values.yaml
# Airflow 3.x with CeleryExecutor
# Simplified configuration compatible with Airflow Helm Chart 1.20.0

# --- Environment Variables ---
env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"
  - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
    value: "True"
  - name: AIRFLOW__WEBSERVER__AUTHENTICATE
    value: "False"
  - name: AIRFLOW__MIGRATION_TIMEOUT
    value: "600"
  - name: AIRFLOW__CELERY__WORKER_CONCURRENCY
    value: "4"

# --- Executor ---
executor: CeleryExecutor

# --- DAGs ---
# Use emptyDir with initContainer to copy from ConfigMap
# This avoids ConfigMap symlink issues that cause "recursive loop" errors
dags:
  persistence:
    enabled: true  # Enable persistence to use emptyDir
    size: 1Gi
    storageClassName: ""  # Use emptyDir default

# Init container to copy DAGs from ConfigMap to emptyDir
# Note: This is a workaround for ConfigMap symlink issues
extraInitContainers:
  - name: copy-dags
    image: apache/airflow:3.1.8
    command:
      - sh
      - -c
      - |
        # Copy DAG files from ConfigMap to DAGs directory
        # ConfigMap creates symlinks which cause recursive loop errors
        if [ -d /dags-source ]; then
          cp -L /dags-source/*.py /opt/airflow/dags/ 2>/dev/null || true
        fi
        echo "DAGs copied:"
        ls -la /opt/airflow/dags/
    volumeMounts:
      - name: dags
        mountPath: /opt/airflow/dags
      - name: dag-source
        mountPath: /dags-source

# Extra volumes for DAG source (ConfigMap)
extraVolumes:
  - name: dag-source
    configMap:
      name: airflow-dag-examples
      optional: true

# --- PostgreSQL Database ---
postgresql:
  enabled: true

# --- Redis (Celery Broker) ---
redis:
  enabled: true

# --- Workers ---
workers:
  replicas: 1
  # KEDA autoscaling configuration
  keda:
    enabled: true
    # Optional: customize KEDA scaling behavior
    # scalingModifiers:
    #   - source: redis
    #     target: ""  # calculated from queue length
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2048Mi

# --- Scheduler ---
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi

# --- Webserver ---
webserver:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    ports:
      - name: airflow-ui
        port: 8080

# --- Statsd ---
statsd:
  enabled: false

# --- PGBouncer ---
pgbouncer:
  enabled: false

# --- Ingress ---
ingress:
  web:
    enabled: false

# --- Pod Disruption Budget ---
podDisruptionBudget:
  enabled: false
