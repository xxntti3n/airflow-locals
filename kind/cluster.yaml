kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: airflow-local
nodes:
  - role: control-plane
    image: kindest/node:v1.29.0
    extraPortMappings:
      # Optional: for future NodePort access
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
    extraMounts:
      # Mount DAGs directory for local development
      - hostPath: ./dags
        containerPath: /dags
        readOnly: true